<div id="view-settings" class="view" style="display:none;">
  <div class="header-row">
    <div>
      <div class="page-title">Settings</div>
      <div class="page-sub">System configuration and user management</div>
    </div>
  </div>

  <div class="settings-tabs" style="display: flex; gap: 16px; margin-bottom: 24px; border-bottom: 1px solid var(--border);">
    <button class="settings-tab active" onclick="switchSettingsTab('general')" style="padding: 12px 16px; border: none; background: none; border-bottom: 2px solid var(--p-accent-gold); font-weight: 600; cursor: pointer; color: var(--text);">General</button>
    <button class="settings-tab" onclick="switchSettingsTab('users')" style="padding: 12px 16px; border: none; background: none; border-bottom: 2px solid transparent; font-weight: 600; cursor: pointer; color: var(--text-soft);">User Management</button>
  </div>

  <!-- General Settings Tab -->
  <div id="settings-tab-general" class="settings-tab-content">
    <div class="card" style="max-width: 600px;">
      <div class="card-bd">
        <h3 style="margin-top: 0; margin-bottom: 16px; font-size: 16px;">Notice Bar Configuration</h3>
        <div class="form-group" style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 13px;">Announcement Text</label>
          <textarea id="settings-notice-text" class="inp" rows="4" style="width: 100%; resize: vertical; padding: 12px;" placeholder="Enter notice text to be displayed across the portal..."></textarea>
          <div style="font-size: 11px; color: var(--text-soft); margin-top: 6px;">This text will scroll horizontally at the top of the portal pages.</div>
        </div>
        <button class="btn btn-saffron" id="settings-notice-save-btn" onclick="saveNoticeSettings()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Users Settings Tab -->
  <div id="settings-tab-users" class="settings-tab-content" style="display:none;">
    <div class="header-row" style="margin-bottom: 16px;">
      <div>
        <div style="font-weight: 600; font-size: 16px;">Manage Portal Users</div>
        <div class="page-sub">Manage roles, upload/review rights, and access scopes</div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-outline btn-sm" onclick="openModal('modal-bulk-invite')">Bulk Invite</button>
        <button class="btn btn-saffron btn-sm" onclick="openAddUserPrompt()">+ Add User</button>
      </div>
    </div>
    <div class="card">
      <div class="card-bd">
        <div class="tbl-wrap">
          <table class="tbl">
            <thead>
              <tr>
                <th>Email</th>
                <th>Role</th>
                <th>Upload</th>
                <th>Review</th>
                <th>Access</th>
                <th>Scope</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-table-body">
              <tr><td colspan="8" style="text-align:center;">Loading users...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  function switchSettingsTab(tabName) {
    document.querySelectorAll('.settings-tab-content').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.settings-tab').forEach(el => {
      el.classList.remove('active');
      el.style.borderBottomColor = 'transparent';
      el.style.color = 'var(--text-soft)';
    });
    
    document.getElementById('settings-tab-' + tabName).style.display = 'block';
    const activeTabBtn = document.querySelector(`.settings-tab[onclick="switchSettingsTab('${tabName}')"]`);
    if(activeTabBtn) {
      activeTabBtn.classList.add('active');
      activeTabBtn.style.borderBottomColor = 'var(--p-accent-gold)';
      activeTabBtn.style.color = 'var(--text)';
    }

    if (tabName === 'users' && typeof loadUsers === 'function') {
      loadUsers();
    }
  }

  async function saveNoticeSettings() {
    const text = document.getElementById('settings-notice-text').value;
    const btn = document.getElementById('settings-notice-save-btn');
    btn.disabled = true;
    btn.innerText = 'Saving...';
    try {
      const res = await fetch('/api/settings/noticeText', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value: text })
      });
      if (res.ok) {
        alert('Notice updated successfully!');
        if (typeof updateNoticeUI === 'function') {
          updateNoticeUI(text);
        }
      } else {
        alert('Failed to update notice.');
      }
    } catch (e) {
      alert('Error updating notice.');
      console.error(e);
    }
    btn.disabled = false;
    btn.innerText = 'Save Changes';
  }
</script>

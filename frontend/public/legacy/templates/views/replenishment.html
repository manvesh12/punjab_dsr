<div id="view-replenishment" class="view">
  <div class="header-row">
    <div>
      <div class="page-title">Replenishment Studies</div>
      <div class="page-sub">Manage Replenishment Studies for DSR projects (Single Source of Truth)</div>
    </div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-outline" onclick="createCustomReplenishmentReport()">+ Custom Replenishment Report</button>
      <button class="btn btn-primary" onclick="createReplenishmentStudy()">+ New Replenishment Study</button>
    </div>
  </div>
  
  <div id="repl-project-select-container" class="card" style="margin-top: 18px; margin-bottom: 18px;">
    <div class="card-hd">
      <div>
        <div class="card-title">Active Project Selection</div>
        <div class="card-sub">Please select a DSR project below to view its associated replenishment studies.</div>
      </div>
    </div>
    <div class="card-bd">
      <div class="field">
        <select id="repl-project-selector" style="max-width: 400px;" onchange="window.selectReplenishmentProject(this.value)">
          <option value="">Loading projects...</option>
        </select>
      </div>
    </div>
  </div>

  <div id="repl-content-container" style="display: none;">
    <div class="card">
      <div class="card-hd">
        <div>
          <div class="card-title">Existing Studies</div>
        </div>
      </div>
      <div class="card-bd" id="replenishment-list">
        <div style="padding:20px; text-align:center; color:var(--text-light);">Select a project first...</div>
      </div>
    </div>
  </div>
  
  <div id="repl-editor-container" style="display: none;"></div>
</div>
